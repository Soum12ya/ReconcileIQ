services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ap_agent
      POSTGRES_USER: ap_agent
      POSTGRES_PASSWORD: localdev
    ports: ["5435:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6382:6379"]

volumes:
  pgdata: